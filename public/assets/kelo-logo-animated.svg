<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108" role="img" aria-label="Animated KELO logo">
  <defs>
    <linearGradient id="keloCycle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00D9FF">
        <animate attributeName="stop-color" dur="30s" repeatCount="indefinite"
          values="#00D9FF;#7C4DFF;#FF2D95;#FFBB00;#00D9FF" />
      </stop>
      <stop offset="50%" stop-color="#FFBB00">
        <animate attributeName="stop-color" dur="30s" repeatCount="indefinite"
          values="#FFBB00;#00FF9C;#FF6A00;#00D9FF;#FFBB00" />
      </stop>
      <stop offset="100%" stop-color="#FF6A00">
        <animate attributeName="stop-color" dur="30s" repeatCount="indefinite"
          values="#FF6A00;#00D9FF;#FFBB00;#7C4DFF;#FF6A00" />
      </stop>
      <animateTransform attributeName="gradientTransform" type="rotate" from="0 0.5 0.5" to="360 0.5 0.5" dur="30s" repeatCount="indefinite" />
    </linearGradient>

    <radialGradient id="softAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="62%" stop-color="#00D9FF" stop-opacity="0.18">
        <animate attributeName="stop-color" dur="30s" repeatCount="indefinite"
          values="#00D9FF;#7C4DFF;#FF2D95;#FFBB00;#00D9FF" />
      </stop>
      <stop offset="100%" stop-color="#FFBB00" stop-opacity="0.32">
        <animate attributeName="stop-color" dur="30s" repeatCount="indefinite"
          values="#FFBB00;#00FF9C;#FF6A00;#00D9FF;#FFBB00" />
      </stop>
    </radialGradient>

    <filter id="premiumGlow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.4" result="blur1" />
      <feFlood flood-color="#00D9FF" flood-opacity="0.9" result="color1">
        <animate attributeName="flood-color" dur="30s" repeatCount="indefinite"
          values="#00D9FF;#7C4DFF;#FF2D95;#FFBB00;#00D9FF" />
      </feFlood>
      <feComposite in="color1" in2="blur1" operator="in" result="glow1" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="5.2" result="blur2" />
      <feFlood flood-color="#FFBB00" flood-opacity="0.55" result="color2">
        <animate attributeName="flood-color" dur="30s" repeatCount="indefinite"
          values="#FFBB00;#00FF9C;#FF6A00;#00D9FF;#FFBB00" />
      </feFlood>
      <feComposite in="color2" in2="blur2" operator="in" result="glow2" />
      <feMerge>
        <feMergeNode in="glow2" />
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="sparkGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="1.3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style><![CDATA[
      .logo-core { filter: url(#premiumGlow); transform-origin: 54px 54px; animation: breathe 3.8s ease-in-out infinite; }
      .ring-spin { transform-origin: 54px 54px; animation: spin 30s linear infinite; opacity: .86; }
      .ring-spin-rev { transform-origin: 54px 54px; animation: spinRev 30s linear infinite; opacity: .55; }
      .spark { filter:url(#sparkGlow); transform-origin:54px 54px; animation: sparkPulse 2.2s ease-in-out infinite; }
      .spark:nth-of-type(2n) { animation-delay: .7s; }
      .spark:nth-of-type(3n) { animation-delay: 1.2s; }
      @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.018); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spinRev { to { transform: rotate(-360deg); } }
      @keyframes sparkPulse { 0%,100% { opacity:.18; transform:scale(.96); } 50% { opacity:.95; transform:scale(1.05); } }
    ]]></style>
  </defs>

  <circle cx="54" cy="54" r="52" fill="url(#softAura)" opacity="0.55" />

  <g class="ring-spin">
    <path d="M54,6 A48,48 0 0 1 102,54" fill="none" stroke="url(#keloCycle)" stroke-width="1.6" stroke-linecap="round" opacity=".95"/>
    <path d="M54,102 A48,48 0 0 1 6,54" fill="none" stroke="url(#keloCycle)" stroke-width="1.2" stroke-linecap="round" opacity=".75"/>
  </g>
  <g class="ring-spin-rev">
    <path d="M10,54 A44,44 0 0 1 54,10" fill="none" stroke="url(#keloCycle)" stroke-width=".9" stroke-linecap="round" opacity=".7"/>
    <path d="M98,54 A44,44 0 0 1 54,98" fill="none" stroke="url(#keloCycle)" stroke-width=".9" stroke-linecap="round" opacity=".7"/>
  </g>

  <g class="spark" stroke="url(#keloCycle)" stroke-linecap="round" opacity=".7">
    <path d="M18 38 l-6 -5" stroke-width="1.1"/>
    <path d="M91 30 l7 -4" stroke-width="1.0"/>
    <path d="M93 79 l8 5" stroke-width="1.2"/>
    <path d="M25 88 l-7 6" stroke-width="1.0"/>
  </g>

  <g class="logo-core">
    <path fill="url(#keloCycle)" d="M54,8 A46,46 0 0 1 100,54 A46,46 0 0 1 54,100 A46,46 0 0 1 8,54 A46,46 0 0 1 54,8 Z"/>
    <path fill="#07101E" d="M54,17 A37,37 0 0 1 91,54 A37,37 0 0 1 54,91 A37,37 0 0 1 17,54 A37,37 0 0 1 54,17 Z"/>
    <path fill="url(#keloCycle)" d="M32,33 L43,33 L43,50 L74,32 L82,37 L57,54 L82,71 L74,76 L43,58 L43,75 L32,75 Z"/>
  </g>
</svg>
